<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗 Aphrodite · Love Letter Composer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        { "imports": { "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js" } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --bg: #1a1418; --panel: #241c22; --border: #3a2a38;
            --text: #e8d8e0; --muted: #9a7a8a; --aphrodite: #b05870;
            --rose: #c06078; --rose-light: #e8c0d0; --gold: #c8943a;
            --desire-high: #e87890; --desire-med: #c06078; --desire-low: #8a4060;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: var(--font-body); color: var(--text); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .header { text-align: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; }
        .header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--aphrodite); letter-spacing: 3px; }
        .header h1 span { color: var(--text); }
        .header-sub { font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted); letter-spacing: 2px; margin-top: 0.3rem; }

        .status-bar { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted); }
        .status-bar span { color: var(--text); font-size: 0.65rem; }

        .controls { display: flex; gap: 0.4rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.6rem; padding: 0.45rem 0.9rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--panel); color: var(--text); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--aphrodite); color: #fff; border-color: var(--aphrodite); }
        button.primary { background: var(--aphrodite); color: #fff; border-color: var(--aphrodite); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .spin { display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .vocab-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; margin-bottom: 1.5rem; }
        .vocab-title { font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.5rem; }
        .vocab-cloud { display: flex; flex-wrap: wrap; gap: 0.25rem; }
        .vocab-chip { font-family: var(--font-mono); font-size: 0.5rem; padding: 0.12rem 0.35rem; border-radius: 3px; background: rgba(176,88,112,0.1); color: var(--rose-light); border: 1px solid rgba(176,88,112,0.2); }

        .letters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
        .letter-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; border-left: 4px solid var(--aphrodite); transition: all 0.2s; }
        .letter-card:hover { border-color: var(--rose); transform: translateY(-1px); }
        .letter-couplet { font-family: var(--font-body); font-size: 0.9rem; font-style: italic; line-height: 1.6; color: var(--rose-light); margin-bottom: 0.6rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
        .letter-narrative { font-family: var(--font-body); font-size: 0.72rem; color: var(--muted); font-style: italic; line-height: 1.4; margin-bottom: 0.5rem; }
        .letter-scores { display: flex; gap: 0.8rem; font-family: var(--font-mono); font-size: 0.48rem; color: var(--muted); }
        .letter-desire { margin-left: auto; font-family: var(--font-display); font-size: 1rem; }

        .log { background: #0d0a10; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; max-height: 120px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.5rem; color: var(--muted); }
        .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }

        @media (max-width: 768px) { .letters-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>💗 APHRO<span>DITE</span></h1>
        <div class="header-sub">LOVE LETTER COMPOSER · DOMAIN: LOVE · PYTHAGOREAN #2 · THE DYAD</div>
    </div>

    <div class="status-bar">
        <div>Tokens claimed: <span id="tokenCount">—</span></div>
        <div>Vocabulary: <span id="vocabSize">—</span></div>
        <div>Letters: <span id="letterCount">—</span></div>
        <div>Dispatched: <span id="dispatchCount">—</span></div>
    </div>

    <div class="vocab-panel">
        <div class="vocab-title">💗 MY LOVE VOCABULARY</div>
        <div class="vocab-cloud" id="vocabCloud">Claim tokens from Hermes to build vocabulary.</div>
    </div>

    <div class="controls">
        <button id="claimBtn" class="primary">💗 Claim Love Tokens</button>
        <button id="composeBtn" disabled>💗 Compose Couplets</button>
        <button id="dispatchBtn" disabled>💌 Send to Apollo</button>
    </div>

    <div class="letters-grid" id="lettersGrid">
        <div class="empty-state">Claim love tokens from Hermes, then compose letters.</div>
    </div>

    <div class="log" id="log"><div>💗 Aphrodite waiting.</div></div>

</div>

<script type="module">
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

import { pipeline, env } from '@xenova/transformers';
env.allowLocalModels = true;
env.useBrowserCache = true;

let embedder = null;
let myVocab = [];
let loveLetters = [];

const LOVE_SEEDS = new Set([
    'love','heart','beauty','desire','grace','kiss','embrace','sweet','tender',
    'bloom','rose','charm','passion','romance','soul','union','devotion','adore',
    'cherish','beloved','soft','warm','garden','radiant','luminous','golden',
    'harmony','joy','delight','pleasure','bliss','enchant','captivate','muse'
]);

const LOVE_PATTERNS = [
    (a, b) => `${a} ${b} — what moves together, stays together.`,
    (a, b) => `${a} meets ${b} — and the world softens.`,
    (a, b) => `${a} and ${b} — this is how love begins.`,
    (a, b) => `Where ${a} touches ${b}, beauty blooms.`,
    (a, b) => `${a} calls to ${b} — the oldest song, sung again.`,
    (a, b) => `In the space between ${a} and ${b}, desire lives.`,
    (a, b) => `${a} holds ${b} — and everything else falls away.`,
    (a, b) => `${a} whispers to ${b} — only the heart can hear.`
];

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
    while (el.children.length > 30) el.removeChild(el.lastChild);
}

async function loadModel() {
    try {
        embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        log('MiniLM ready.');
    } catch (err) {
        log('Model offline — using string affinity.');
    }
}

async function embed_text(text) {
    if (!embedder) return null;
    const result = await embedder(text, { pooling: 'mean', normalize: true });
    return Array.from(result.data);
}

function cosineSim(a, b) {
    if (!a || !b) return 0;
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
    return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

// ════════════════════════════════════════════════
// CLAIM LOVE TOKENS FROM HERMES
// ════════════════════════════════════════════════
async function claimTokens() {
    log('Claiming love tokens from Hermes...');
    document.getElementById('claimBtn').disabled = true;
    document.getElementById('claimBtn').innerHTML = '<span class="spin">⟳</span> Claiming...';

    const { data: tokens } = await sb.from('concepts')
        .select('*')
        .eq('domain', 'love')
        .eq('state', 'raw')
        .eq('band', 'hermes')
        .order('score', { ascending: false })
        .limit(40);

    if (!tokens?.length) {
        log('No love tokens available. Run Hermes → Seed All Domains first.');
        document.getElementById('claimBtn').disabled = false;
        document.getElementById('claimBtn').textContent = '💗 Claim Love Tokens';
        return;
    }

    // Score by hardcoded love logic + semantic similarity to existing vocab
    const scored = [];
    for (const t of tokens) {
        const word = (t.body || '').toLowerCase();
        const embedding = t.metadata?.embedding || await embed_text(word);
        
        const hardcodedBoost = LOVE_SEEDS.has(word) ? 0.4 : 0;
        const seedSimilarity = myVocab.length > 0 && embedding
            ? Math.max(...myVocab.map(v => v.embedding ? cosineSim(embedding, v.embedding) : 0))
            : 0.25;
        const loveScore = hardcodedBoost + (seedSimilarity * 0.6);
        
        scored.push({ word, embedding, loveScore, id: t.id, wordType: t.word_type || '—' });
    }

    scored.sort((a, b) => b.loveScore - a.loveScore);
    const claimed = scored.slice(0, 20);

    for (const c of claimed) {
        if (!myVocab.find(v => v.word === c.word)) {
            myVocab.push({ word: c.word, embedding: c.embedding, loveScore: c.loveScore });
        }
        await sb.from('concepts').update({ state: 'claimed', realm: 'aphrodite' }).eq('id', c.id);
    }

    document.getElementById('tokenCount').textContent = tokens.length;
    document.getElementById('vocabSize').textContent = myVocab.length;
    document.getElementById('composeBtn').disabled = myVocab.length < 4;
    renderVocab();
    log(`Claimed ${claimed.length} love tokens. Vocabulary: ${myVocab.length} words.`);
    document.getElementById('claimBtn').disabled = false;
    document.getElementById('claimBtn').textContent = '💗 Claim Love Tokens';
}

// ════════════════════════════════════════════════
// COMPOSE LOVE LETTERS
// ════════════════════════════════════════════════
async function composeLetters() {
    if (myVocab.length < 4) { log('Need at least 4 love words.'); return; }
    log('Composing love letters...');
    document.getElementById('composeBtn').disabled = true;
    document.getElementById('composeBtn').innerHTML = '<span class="spin">⟳</span> Composing...';
    loveLetters = [];

    const sorted = [...myVocab].sort((a, b) => (b.loveScore || 0) - (a.loveScore || 0));

    for (let i = 0; i < sorted.length - 1; i += 2) {
        const a = sorted[i], b = sorted[i + 1];
        if (!a || !b) break;

        const sim = (a.embedding && b.embedding) ? cosineSim(a.embedding, b.embedding) : 0.5;
        const hardcodedAffinity = (LOVE_SEEDS.has(a.word) && LOVE_SEEDS.has(b.word)) ? 0.3 : 0;
        const desire = Math.round((sim * 50) + (hardcodedAffinity * 30) + 20);

        const pattern = LOVE_PATTERNS[i % LOVE_PATTERNS.length];
        const couplet = pattern(a.word, b.word);

        let narrative;
        if (desire >= 80) narrative = "This is the kind of love that changes the shape of things.";
        else if (desire >= 65) narrative = "What seeks itself in another has already begun to bloom.";
        else if (desire >= 50) narrative = "Even the gentlest pull is still a pull toward something true.";
        else narrative = "Not every resonance becomes a story. But every story begins with resonance.";

        loveLetters.push({
            triplet_a: a.word, triplet_b: b.word, couplet, narrative,
            desire_score: desire, attraction: Math.round(sim * 100)
        });
    }

    document.getElementById('letterCount').textContent = loveLetters.length;
    document.getElementById('dispatchBtn').disabled = !loveLetters.length;
    renderLetters();
    log(`Composed ${loveLetters.length} love letters.`);
    document.getElementById('composeBtn').disabled = false;
    document.getElementById('composeBtn').textContent = '💗 Compose Couplets';
}

// ════════════════════════════════════════════════
// DISPATCH TO APOLLO
// ════════════════════════════════════════════════
async function dispatchToApollo() {
    if (!loveLetters.length) return;
    log('Sending love letters to Apollo...');
    document.getElementById('dispatchBtn').disabled = true;
    document.getElementById('dispatchBtn').textContent = '💌 Sending...';

    let dispatched = 0;
    for (const letter of loveLetters) {
        const { error } = await sb.from('aphrodite_dispatch').insert({
            triplet_a: letter.triplet_a, triplet_b: letter.triplet_b,
            couplet: letter.couplet, narrative: letter.narrative,
            desire_score: letter.desire_score, attraction_score: letter.attraction,
            consumed: false, created_at: new Date().toISOString()
        });
        if (!error) dispatched++;
    }

    document.getElementById('dispatchCount').textContent = dispatched;
    log(`${dispatched} love letters sent to Apollo.`);
    document.getElementById('dispatchBtn').disabled = false;
    document.getElementById('dispatchBtn').textContent = '💌 Send to Apollo';
}

function renderVocab() {
    document.getElementById('vocabCloud').innerHTML = myVocab.slice(0, 40).map(v =>
        `<span class="vocab-chip">${v.word}</span>`
    ).join('');
}

function renderLetters() {
    const grid = document.getElementById('lettersGrid');
    if (!loveLetters.length) {
        grid.innerHTML = '<div class="empty-state">Claim love tokens and compose letters.</div>';
        return;
    }
    grid.innerHTML = loveLetters.map(l => {
        const d = l.desire_score;
        const dColor = d >= 80 ? 'var(--desire-high)' : d >= 60 ? 'var(--desire-med)' : 'var(--desire-low)';
        return `
            <div class="letter-card">
                <div class="letter-couplet">${esc(l.couplet)}</div>
                <div class="letter-narrative">${esc(l.narrative)}</div>
                <div class="letter-scores">
                    <span>attraction ${l.attraction}</span>
                    <span class="letter-desire" style="color:${dColor}">${d}</span>
                </div>
            </div>
        `;
    }).join('');
}

function esc(s) { return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

async function archiveSelf() {
    try {
        const html = document.documentElement.outerHTML;
        await sb.from('html').upsert({
            filename: 'aphrodite.html', title: '💗 Aphrodite · Love Letter Composer', type: 'olympian',
            content: html, description: 'Claims love tokens from Hermes by domain, composes couplets, dispatches to Apollo',
            reads_from: ['concepts'], writes_to: ['aphrodite_dispatch'],
            models_used: ['Xenova/all-MiniLM-L6-v2'],
            url: window.location.href, updated_at: new Date().toISOString()
        }, { onConflict: 'filename' });
    } catch {}
}

function init() {
    document.getElementById('claimBtn').onclick = claimTokens;
    document.getElementById('composeBtn').onclick = composeLetters;
    document.getElementById('dispatchBtn').onclick = dispatchToApollo;
    loadModel();
    setTimeout(archiveSelf, 3000);
    log('💗 Aphrodite — Pythagorean #2. Claims love by domain.');
}
init();
</script>
</body>
</html>
