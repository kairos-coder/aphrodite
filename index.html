<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗 Aphrodite · Desire Pairing Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        { "imports": { "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js" } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');

        :root {
            --bg: #1a1418;
            --panel: #241c22;
            --border: #3a2a38;
            --text: #e8d8e0;
            --muted: #9a7a8a;
            --aphrodite: #b05870;
            --rose: #c06078;
            --gold: #c8943a;
            --desire-high: #e87890;
            --desire-med: #c06078;
            --desire-low: #8a4060;
            --keep: #6b8e5a;
            --font-display: 'Cinzel', serif;
            --font-body: 'Crimson Pro', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: var(--font-body); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
        .header h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--aphrodite); letter-spacing: 4px; }
        .header h1 span { color: var(--text); }
        .header-sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; margin-top: 0.5rem; }
        .type-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-family: var(--font-mono); font-size: 0.55rem; background: rgba(176,88,112,0.15); color: var(--aphrodite); border: 1px solid var(--aphrodite); margin-top: 0.5rem; }

        .status-bar { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); }
        .status-bar span { color: var(--text); }

        .controls { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--panel); color: var(--text); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--aphrodite); color: #fff; border-color: var(--aphrodite); }
        button.primary { background: var(--aphrodite); color: #fff; border-color: var(--aphrodite); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .spin { display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pairs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 0.8rem; margin-bottom: 2rem; }

        .pair-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; transition: all 0.2s; border-left: 3px solid var(--aphrodite); }
        .pair-card:hover { border-color: var(--rose); transform: translateY(-1px); }
        .pair-card.token-token { border-left-color: var(--gold); }
        .pair-card.token-svo { border-left-color: var(--desire-high); }
        .pair-card.svo-svo { border-left-color: var(--rose); }
        .pair-card.verb-verb { border-left-color: #a070c0; }
        .pair-card.subject-object { border-left-color: #70a0c0; }

        .pair-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .pair-items { font-family: var(--font-body); font-size: 0.9rem; font-style: italic; margin-bottom: 0.5rem; line-height: 1.4; }
        .pair-item-a { color: var(--rose); }
        .pair-item-b { color: #c0a0b0; }
        .pair-connector { color: var(--muted); font-size: 0.7rem; margin: 0 0.3rem; }

        .pair-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem; margin-bottom: 0.5rem; font-family: var(--font-mono); font-size: 0.5rem; color: var(--muted); }
        .pair-scores div { text-align: center; }
        .score-val { font-size: 0.65rem; display: block; }
        .score-val.high { color: var(--desire-high); }
        .score-val.med { color: var(--desire-med); }
        .score-val.low { color: var(--desire-low); }

        .pair-meta { display: flex; gap: 0.3rem; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.48rem; }
        .pair-tag { padding: 0.1rem 0.4rem; border-radius: 2px; background: rgba(176,88,112,0.1); color: var(--muted); }
        .pair-desire { margin-left: auto; font-family: var(--font-display); font-size: 0.8rem; }

        .log { background: #0d0a10; border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; max-height: 150px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.52rem; color: var(--muted); }
        .log-entry { padding: 0.1rem 0; }

        @media (max-width: 768px) { .pairs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>💗 APHRO<span>DITE</span></h1>
        <div class="header-sub">DESIRE PAIRING ENGINE · PYTHAGOREAN #2 · THE DYAD</div>
        <div class="type-badge">OLYMPIAN</div>
    </div>

    <div class="status-bar" id="statusBar">
        <div>Tokens: <span id="tokenCount">—</span></div>
        <div>Triplets: <span id="tripletCount">—</span></div>
        <div>Pairs: <span id="pairCount">—</span></div>
        <div>Dispatched: <span id="dispatchCount">—</span></div>
    </div>

    <div class="controls">
        <button id="fetchBtn" class="primary">📥 Fetch from Hermes + Demeter</button>
        <button id="pairBtn" disabled>💗 Find Pairs</button>
        <button id="dispatchBtn" disabled>📤 Dispatch to Ares</button>
    </div>

    <div class="pairs-grid" id="pairsGrid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);font-style:italic;">
            Fetch tokens and triplets, then find what desires what.
        </div>
    </div>

    <div class="log" id="log"><div class="log-entry">💗 Aphrodite waiting. The Dyad observes.</div></div>

</div>

<script type="module">
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

import { pipeline, env } from '@xenova/transformers';
env.allowLocalModels = true;
env.useBrowserCache = true;

let embedder = null;
let modelReady = false;
let allItems = [];
let pairs = [];

const BEAUTY_ANCHORS = ['harmonia', 'golden', 'luminous', 'graceful', 'radiant', 'elegant', 'bloom', 'resonance'];
let beautyEmbeddings = [];

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div class="log-entry">[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
    while (el.children.length > 30) el.removeChild(el.lastChild);
}

async function loadModel() {
    try {
        log('Loading MiniLM (shared with Hermes/Demeter, cached)...');
        embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        modelReady = true;
        document.getElementById('pairBtn').disabled = false;
        log('✓ MiniLM ready. Aphrodite can feel desire.');
    } catch (err) {
        log(`Model failed: ${err.message}. Using fallback scoring.`);
        modelReady = false;
        document.getElementById('pairBtn').disabled = false;
    }
}

async function embed_text(text) {
    if (!embedder) return null;
    const result = await embedder(text, { pooling: 'mean', normalize: true });
    return Array.from(result.data);
}

function cosineSim(a, b) {
    if (!a || !b) return 0;
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
    return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

async function fetchAll() {
    log('Fetching from Hermes and Demeter...');
    document.getElementById('fetchBtn').disabled = true;
    document.getElementById('fetchBtn').innerHTML = '<span class="spin">⟳</span> Fetching...';
    allItems = [];
    pairs = [];

    try {
        const { data: tokens } = await sb.from('concepts').select('*').eq('state', 'raw').eq('band', 'hermes').order('created_at', { ascending: false }).limit(30);
        const { data: triplets } = await sb.from('svo_triplets').select('*').eq('state', 'raw').order('created_at', { ascending: false }).limit(30);

        const tokenList = (tokens || []).map(t => ({ type: 'token', id: t.id, text: t.body || t.word || '', embedding: null }));
        const tripletList = (triplets || []).map(t => ({
            type: 'svo_triplet', id: t.id,
            text: `${t.subject || ''} ${t.verb || ''} ${t.object || ''}`.trim(),
            subject: t.subject, verb: t.verb, object: t.object,
            embedding: null
        }));

        allItems = [...tokenList, ...tripletList];

        if (modelReady) {
            log(`Embedding ${allItems.length} items...`);
            for (const item of allItems) {
                item.embedding = await embed_text(item.text);
            }
        }

        document.getElementById('tokenCount').textContent = tokenList.length;
        document.getElementById('tripletCount').textContent = tripletList.length;
        document.getElementById('pairBtn').disabled = false;
        log(`✓ Fetched ${tokenList.length} tokens + ${tripletList.length} triplets`);

    } catch (err) {
        log(`Fetch error: ${err.message}`);
    }

    document.getElementById('fetchBtn').disabled = false;
    document.getElementById('fetchBtn').textContent = '📥 Fetch from Hermes + Demeter';
}

async function scoreBeauty(text) {
    if (!modelReady || !beautyEmbeddings.length) return 0.5;
    const emb = await embed_text(text);
    if (!emb) return 0.5;
    const sims = beautyEmbeddings.map(b => cosineSim(emb, b));
    return sims.reduce((a, b) => a + b, 0) / sims.length;
}

async function initBeautyAnchors() {
    if (!modelReady) return;
    for (const anchor of BEAUTY_ANCHORS) {
        const emb = await embed_text(anchor);
        if (emb) beautyEmbeddings.push(emb);
    }
}

async function findPairs() {
    if (allItems.length < 2) { log('Need at least 2 items to pair'); return; }
    log('Finding pairs by desire...');
    document.getElementById('pairBtn').disabled = true;
    document.getElementById('pairBtn').innerHTML = '<span class="spin">⟳</span> Pairing...';
    pairs = [];

    await initBeautyAnchors();

    for (let i = 0; i < allItems.length; i++) {
        for (let j = i + 1; j < allItems.length; j++) {
            const a = allItems[i], b = allItems[j];
            const sim = modelReady && a.embedding && b.embedding
                ? cosineSim(a.embedding, b.embedding)
                : 0.5 + (Math.random() * 0.2 - 0.1);

            if (sim >= 0.30 && sim <= 0.75) {
                const tension = 1 - Math.abs(sim - 0.50);
                const beauty = modelReady ? await scoreBeauty(a.text + ' ' + b.text) : 0.5;
                const desire = Math.round((sim * 40) + (tension * 35) + (beauty * 25));

                let pairType = `${a.type}-${b.type}`;
                if (a.type === 'svo_triplet' && b.type === 'svo_triplet') {
                    if (a.verb === b.verb) pairType = 'verb-verb';
                    else if (a.subject === b.object || a.object === b.subject) pairType = 'subject-object';
                }

                pairs.push({
                    item_a_type: a.type, item_a_id: a.id, item_a_text: a.text,
                    item_b_type: b.type, item_b_id: b.id, item_b_text: b.text,
                    attraction_score: Math.round(sim * 100),
                    tension_score: Math.round(tension * 100),
                    beauty_score: Math.round(beauty * 100),
                    desire_score: desire,
                    pair_type: pairType,
                    state: 'raw'
                });
            }
        }
    }

    pairs.sort((a, b) => b.desire_score - a.desire_score);
    pairs = pairs.slice(0, 24);

    document.getElementById('pairCount').textContent = pairs.length;
    document.getElementById('dispatchBtn').disabled = pairs.length === 0;
    renderPairs();
    log(`✓ Found ${pairs.length} pairs by desire`);
    document.getElementById('pairBtn').disabled = false;
    document.getElementById('pairBtn').textContent = '💗 Find Pairs';
}

function renderPairs() {
    const grid = document.getElementById('pairsGrid');
    if (!pairs.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);font-style:italic;">No pairs yet. Find what desires what.</div>';
        return;
    }
    grid.innerHTML = pairs.map((p, i) => {
        const d = p.desire_score;
        const dClass = d >= 80 ? 'high' : d >= 60 ? 'med' : 'low';
        return `
            <div class="pair-card ${p.pair_type}">
                <div class="pair-head">
                    <span class="pair-tag">${p.pair_type}</span>
                    <span class="pair-desire" style="color:${d>=80?'var(--desire-high)':d>=60?'var(--desire-med)':'var(--desire-low)'}">${d}</span>
                </div>
                <div class="pair-items">
                    <span class="pair-item-a">${esc(p.item_a_text)}</span>
                    <span class="pair-connector">+</span>
                    <span class="pair-item-b">${esc(p.item_b_text)}</span>
                </div>
                <div class="pair-scores">
                    <div>attraction<span class="score-val">${p.attraction_score}</span></div>
                    <div>tension<span class="score-val">${p.tension_score}</span></div>
                    <div>beauty<span class="score-val">${p.beauty_score}</span></div>
                </div>
            </div>
        `;
    }).join('');
}

async function dispatchToAres() {
    if (!pairs.length) return;
    log('Dispatching pairs to Ares...');
    document.getElementById('dispatchBtn').disabled = true;

    let dispatched = 0;
    for (const p of pairs) {
        const { error } = await sb.from('aphrodite_pairs').insert({
            item_a_type: p.item_a_type, item_a_id: p.item_a_id, item_a_text: p.item_a_text,
            item_b_type: p.item_b_type, item_b_id: p.item_b_id, item_b_text: p.item_b_text,
            attraction_score: p.attraction_score,
            beauty_score: p.beauty_score,
            tension_score: p.tension_score,
            desire_score: p.desire_score,
            pair_type: p.pair_type,
            state: 'raw',
            created_at: new Date().toISOString()
        });
        if (!error) dispatched++;
    }

    document.getElementById('dispatchCount').textContent = dispatched;
    log(`✓ Dispatched ${dispatched} pairs to aphrodite_pairs — Ares awaits`);
}

async function archiveSelf() {
    const html = document.documentElement.outerHTML;
    await sb.from('html').upsert({
        filename: 'aphrodite.html',
        title: '💗 Aphrodite · Desire Pairing Engine',
        type: 'olympian',
        content: html,
        description: 'Pairs raw tokens and SVO triplets by desire, beauty, and attraction. Feeds Ares.',
        reads_from: ['concepts', 'svo_triplets'],
        writes_to: ['aphrodite_pairs'],
        models_used: ['Xenova/all-MiniLM-L6-v2'],
        url: window.location.href,
        updated_at: new Date().toISOString()
    }, { onConflict: 'filename' });
}

function esc(s) { return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

function init() {
    document.getElementById('fetchBtn').addEventListener('click', fetchAll);
    document.getElementById('pairBtn').addEventListener('click', findPairs);
    document.getElementById('dispatchBtn').addEventListener('click', dispatchToAres);
    loadModel();
    setTimeout(archiveSelf, 3000);
    log('💗 Aphrodite initialized — Pythagorean #2, the Dyad');
}
init();
</script>
</body>
</html>
